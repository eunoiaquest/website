media: public/blog
content:
  - name: posts-en
    label: Posts (English)
    type: collection
    path: src/content/blog/en
    view:
      fields: [title, date, author]
    fields:
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: text
      - name: date
        label: Date
        type: date
      - name: author
        label: Author
        type: string
      - name: image
        label: Cover Image
        type: image
      - name: body
        label: Body
        type: rich-text

  - name: posts-de
    label: Posts (German)
    type: collection
    path: src/content/blog/de
    view:
      fields: [title, date, author]
    fields:
      - name: title
        label: Titel
        type: string
      - name: description
        label: Beschreibung
        type: text
      - name: date
        label: Datum
        type: date
      - name: author
        label: Autor
        type: string
      - name: image
        label: Titelbild
        type: image
      - name: body
        label: Inhalt
        type: rich-text
